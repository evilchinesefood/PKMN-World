name: Build ROM

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (modern toolchain)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install libpng + build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpng-dev

      # Pinned to match the project's arm-none-eabi-gcc 13.2 (INSTALL.md: modern only, no agbcc).
      - name: Install ARM bare-metal toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '13.2.Rel1'

      - name: Build
        run: make -j"$(nproc)"

      # The built ROM as a downloadable test build. NOTE: on a public repo this artifact is
      # publicly downloadable — remove this step if you want to keep strictly to the
      # "no ROMs distributed, build from source" stance in the README.
      - name: Upload test build
        uses: actions/upload-artifact@v4
        with:
          name: pokemon-world-test-build
          path: pokemonworld.gba
          if-no-files-found: error
          retention-days: 14
